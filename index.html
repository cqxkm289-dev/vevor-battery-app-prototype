<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEVOR Golf Cart Battery App · 交互原型 V2.0</title>
<style>
  /* ============ 外层页面（工具栏 + 画布） ============ */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background:#E9EBEF; color:#1c1e21; overflow:hidden;
  }
  #toolbar {
    height:56px; background:#fff; border-bottom:1px solid #dcdfe5;
    display:flex; align-items:center; gap:10px; padding:0 16px; flex-wrap:nowrap; overflow-x:auto;
  }
  #toolbar .brand { font-weight:700; font-size:14px; white-space:nowrap; }
  #toolbar .brand span { color:#FF7A1A; }
  #toolbar .sep { width:1px; height:24px; background:#e1e4e9; flex:none; }
  .tbtn {
    border:1px solid #d4d8df; background:#fff; border-radius:8px; padding:6px 12px;
    font-size:12.5px; cursor:pointer; white-space:nowrap; color:#3a3d42; transition:all .15s;
  }
  .tbtn:hover { border-color:#FF7A1A; color:#FF7A1A; }
  .tbtn.on { background:#FF7A1A; border-color:#FF7A1A; color:#fff; }
  select.tbtn { appearance:auto; }
  #stage { height:calc(100% - 56px); display:flex; align-items:center; justify-content:center; gap:28px; padding:18px; }
  #phoneWrap { flex:none; }

  /* ============ 标注面板 ============ */
  #notesPanel {
    width:360px; max-height:92%; background:#fff; border:1px solid #dcdfe5; border-radius:14px;
    padding:18px 20px; overflow-y:auto; font-size:13px; line-height:1.75; color:#2c2f34;
    box-shadow:0 6px 24px rgba(0,0,0,.06);
  }
  #notesPanel h3 { font-size:14px; margin-bottom:10px; color:#111; display:flex; align-items:center; gap:6px; }
  #notesPanel h3::before { content:""; width:4px; height:14px; background:#FF7A1A; border-radius:2px; }
  #notesPanel h4 { font-size:12.5px; margin:12px 0 4px; color:#FF7A1A; }
  #notesPanel ul { padding-left:18px; }
  #notesPanel li { margin-bottom:3px; }
  #notesPanel table { width:100%; border-collapse:collapse; font-size:12px; margin:6px 0; }
  #notesPanel th, #notesPanel td { border:1px solid #e4e7ec; padding:4px 7px; text-align:left; }
  #notesPanel th { background:#f6f7f9; font-weight:600; }
  #notesPanel .tag { display:inline-block; background:#FFF1E6; color:#E06000; border-radius:4px; padding:0 6px; font-size:11px; margin-right:4px; }

  /* ============ 手机框 ============ */
  #phone {
    width:390px; height:844px; border-radius:54px; background:#000;
    border:12px solid #17181a; box-shadow:0 24px 60px rgba(0,0,0,.35), inset 0 0 0 2px #2a2b2e;
    position:relative; overflow:hidden;
  }
  #notch { position:absolute; top:12px; left:50%; transform:translateX(-50%); width:120px; height:32px; background:#17181a; border-radius:18px; z-index:99; }
  #screen { width:100%; height:100%; position:relative; overflow:hidden; display:flex; flex-direction:column; }

  /* ============ APP 主题变量 ============ */
  #screen[data-theme="dark"] {
    --bg:#0B0C0E; --bg2:#131417; --card:#1B1D21; --card2:#24262B; --line:#2B2D33;
    --tx:#FFFFFF; --tx2:#9A9DA6; --tx3:#6E7178;
    --brand:#FF7A1A; --brand-soft:rgba(255,122,26,.14);
    --green:#34C759; --green-soft:rgba(52,199,89,.14);
    --red:#FF453A; --red-soft:rgba(255,69,58,.14);
    --yellow:#FFD60A; --yellow-soft:rgba(255,214,10,.12);
    --orange-soft:rgba(255,149,0,.14); --blue:#3D9BFF;
    --mask:rgba(0,0,0,.55); --shadow:0 4px 16px rgba(0,0,0,.4);
  }
  #screen[data-theme="light"] {
    --bg:#F2F3F6; --bg2:#FFFFFF; --card:#FFFFFF; --card2:#F5F6F8; --line:#E6E8EC;
    --tx:#17181A; --tx2:#6B6E76; --tx3:#9CA0A8;
    --brand:#F26A00; --brand-soft:rgba(242,106,0,.10);
    --green:#1FA84A; --green-soft:rgba(31,168,74,.10);
    --red:#E5372C; --red-soft:rgba(229,55,44,.08);
    --yellow:#D9A400; --yellow-soft:rgba(217,164,0,.10);
    --orange-soft:rgba(242,106,0,.10); --blue:#1677D9;
    --mask:rgba(0,0,0,.4); --shadow:0 4px 16px rgba(0,0,0,.08);
  }
  #screen { background:var(--bg); color:var(--tx); }

  /* ============ APP 通用 ============ */
  .statusbar { height:54px; flex:none; display:flex; align-items:flex-end; justify-content:space-between; padding:0 28px 4px; font-size:14px; font-weight:600; color:var(--tx); }
  .sb-icons { display:flex; gap:5px; align-items:center; }
  .appheader { height:48px; flex:none; display:flex; align-items:center; padding:0 18px; gap:8px; }
  .appheader .dev { font-size:15px; font-weight:700; letter-spacing:.2px; }
  .appheader .conn { display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--green); background:var(--green-soft); border-radius:10px; padding:2px 9px; }
  .appheader .conn::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--green); }
  .appheader .bell { margin-left:auto; position:relative; width:24px; height:24px; cursor:pointer; }
  .appheader .bell::after { content:""; position:absolute; top:1px; right:1px; width:7px; height:7px; background:var(--red); border-radius:50%; border:1.5px solid var(--bg); }
  .content { flex:1; display:flex; flex-direction:column; overflow:hidden; padding:0 16px; }
  .tabbar { flex:none; height:84px; border-top:1px solid var(--line); background:var(--bg2); display:flex; padding-bottom:18px; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:10px; color:var(--tx3); cursor:pointer; }
  .tab.on { color:var(--brand); }
  .tab svg { width:23px; height:23px; }
  .card { background:var(--card); border-radius:14px; box-shadow:var(--shadow); }
  .btn-primary {
    background:var(--brand); color:#fff; border:none; border-radius:12px; height:52px; width:100%;
    font-size:16px; font-weight:700; cursor:pointer; letter-spacing:.2px;
  }
  .btn-primary:active { opacity:.85; }
  .link { color:var(--tx2); font-size:13px; text-align:center; cursor:pointer; }
  .link b { color:var(--brand); }

  /* ============ 蓝牙流程 ============ */
  .bt-page { flex:1; display:flex; flex-direction:column; padding:0 24px; }
  .bt-logo { text-align:center; margin-top:9%; }
  .bt-logo .mark { font-size:40px; }
  .bt-logo h1 { font-size:23px; font-weight:800; letter-spacing:1px; margin-top:8px; }
  .bt-logo h1 span { color:var(--brand); }
  .perm-card { margin-top:10%; padding:8px 18px; }
  .perm-row { display:flex; align-items:center; gap:14px; height:64px; }
  .perm-row + .perm-row { border-top:1px solid var(--line); }
  .perm-row .ic { font-size:22px; }
  .perm-row .t1 { font-size:15.5px; font-weight:600; }
  .perm-row .t2 { font-size:12.5px; color:var(--tx2); margin-top:2px; }
  .bt-foot { margin-top:auto; padding-bottom:36px; }
  .bt-foot .legal { font-size:11px; color:var(--tx3); text-align:center; margin-top:14px; }

  /* 扫描脉冲 */
  .pulse-zone { height:36%; flex:none; display:flex; align-items:center; justify-content:center; position:relative; }
  .pulse-core { width:74px; height:74px; border-radius:50%; background:var(--brand-soft); display:flex; align-items:center; justify-content:center; font-size:32px; z-index:2; }
  .pulse-ring { position:absolute; width:74px; height:74px; border-radius:50%; border:2px solid var(--brand); opacity:0; animation:pulse 2s ease-out infinite; }
  .pulse-ring:nth-child(2) { animation-delay:.66s; }
  .pulse-ring:nth-child(3) { animation-delay:1.32s; }
  @keyframes pulse { 0%{transform:scale(1);opacity:.7;} 100%{transform:scale(3.1);opacity:0;} }
  .scan-txt { text-align:center; font-size:14px; color:var(--tx2); }
  .tips-box { margin:18px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:14px 4px; font-size:13px; color:var(--tx2); line-height:2; }
  .found-label { display:flex; align-items:center; gap:10px; color:var(--tx3); font-size:12px; margin:6px 0 10px; }
  .found-label::before, .found-label::after { content:""; flex:1; height:1px; background:var(--line); }

  .dev-card { display:flex; align-items:center; gap:12px; padding:14px 16px; margin-bottom:12px; }
  .dev-card .ic { font-size:26px; }
  .dev-card .nm { font-size:15.5px; font-weight:700; }
  .dev-card .sig { font-size:12px; color:var(--tx2); margin-top:3px; display:flex; align-items:center; gap:6px; }
  .sigbars { display:inline-flex; gap:2px; align-items:flex-end; height:12px; }
  .sigbars i { width:3.5px; background:var(--green); border-radius:1px; }
  .sigbars i.off { background:var(--line); }
  .btn-sm { margin-left:auto; background:var(--brand); color:#fff; border:none; border-radius:8px; padding:9px 18px; font-size:13.5px; font-weight:700; cursor:pointer; }

  /* 连接中 */
  .connect-zone { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; }
  .conn-anim { display:flex; align-items:center; gap:10px; font-size:34px; }
  .conn-line { width:130px; height:3px; border-radius:2px; background:repeating-linear-gradient(90deg, var(--brand) 0 10px, transparent 10px 18px); background-size:36px 3px; animation:flow 1s linear infinite; }
  @keyframes flow { to { background-position:36px 0; } }
  .conn-txt { font-size:14px; color:var(--tx2); text-align:center; line-height:1.8; }

  /* 成功 */
  .ok-zone { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
  .ok-badge { width:84px; height:84px; border-radius:50%; background:var(--green-soft); display:flex; align-items:center; justify-content:center; animation:pop .45s cubic-bezier(.2,1.6,.4,1); margin-bottom:8px; }
  @keyframes pop { 0%{transform:scale(.3);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  .ok-zone h2 { font-size:21px; font-weight:800; }
  .ok-zone .sub { font-size:14px; color:var(--brand); font-weight:600; }
  .ok-zone .sn { font-size:12px; color:var(--tx3); }

  /* 未发现 */
  .nf-head { text-align:center; margin-top:6%; }
  .nf-head .ic { font-size:44px; opacity:.5; }
  .nf-head h2 { font-size:19px; color:var(--tx2); font-weight:700; margin-top:10px; }
  .steps-card { margin-top:20px; padding:6px 18px; }
  .step-row { display:flex; gap:12px; padding:13px 0; }
  .step-row + .step-row { border-top:1px solid var(--line); }
  .step-row .no { width:22px; height:22px; border-radius:50%; background:var(--brand-soft); color:var(--brand); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:none; margin-top:1px; }
  .step-row .t1 { font-size:14px; font-weight:700; }
  .step-row .t2 { font-size:12px; color:var(--tx2); margin-top:2px; }

  /* ============ Tab1 Dashboard ============ */
  .soc-zone { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 0 6px; }
  .ring-box { position:relative; width:232px; height:232px; }
  .ring-box svg { transform:rotate(-90deg); }
  .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-center .lbl { font-size:13px; color:var(--tx2); letter-spacing:2px; font-weight:600; }
  .ring-center .val { font-size:54px; font-weight:800; line-height:1.1; letter-spacing:-1px; }
  .ring-center .val small { font-size:26px; font-weight:700; }
  .ring-center .amp { font-size:15px; color:var(--green); font-weight:600; margin-top:2px; }
  .ring-center .chg { font-size:12.5px; color:var(--tx2); margin-top:1px; }
  .health-line { display:flex; align-items:center; gap:7px; font-size:14px; color:var(--tx2); margin-top:8px; }
  .health-line b { color:var(--tx); font-size:15px; }
  .quad { display:flex; gap:8px; margin-top:14px; }
  .quad .q { flex:1; background:var(--card); border-radius:12px; padding:13px 4px; text-align:center; box-shadow:var(--shadow); }
  .quad .q .v { font-size:17px; font-weight:800; }
  .quad .q .v small { font-size:11px; font-weight:600; color:var(--tx2); }
  .quad .q .k { font-size:10.5px; color:var(--tx3); margin-top:3px; }
  .alert-banner { margin:14px 0 16px; border-radius:13px; padding:16px 16px; display:flex; align-items:center; gap:10px; font-size:14.5px; font-weight:700; cursor:pointer; }
  .alert-banner.ok { background:var(--green-soft); color:var(--green); }
  .alert-banner.bad { background:var(--red-soft); color:var(--red); }
  .alert-banner .arr { margin-left:auto; font-weight:400; opacity:.8; }

  /* ============ Tab2 Lifetime Guard ============ */
  .lg-title { display:flex; align-items:center; gap:8px; padding:10px 2px 10px; }
  .lg-title h2 { font-size:17px; font-weight:800; color:var(--brand); }
  .lg-title .act { margin-left:auto; display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--green); background:var(--green-soft); border-radius:10px; padding:2px 9px; }
  .lg-title .act::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--green); }
  .guard-card { padding:16px 16px 14px; }
  .gbar-labels { display:flex; justify-content:space-between; font-size:12px; color:var(--tx2); margin-bottom:7px; }
  .gbar-labels b { color:var(--tx); }
  .gbar { position:relative; height:14px; border-radius:7px; background:var(--card2); }
  .gbar .fill { position:absolute; left:0; top:0; bottom:0; border-radius:7px; background:linear-gradient(90deg, #46d56a, var(--green)); transition:width .4s; }
  .gbar .cap { position:absolute; top:-7px; width:2.5px; height:28px; background:var(--brand); border-radius:2px; transition:left .4s; }
  .gbar .capshield { position:absolute; top:-26px; transform:translateX(-50%); font-size:14px; transition:left .4s; }
  .gbar .restzone { position:absolute; right:0; top:0; bottom:0; border-radius:0 7px 7px 0; background:repeating-linear-gradient(135deg, transparent 0 4px, var(--line) 4px 6px); }
  .guard-sub { font-size:12.5px; color:var(--tx2); margin-top:13px; }
  .guard-gain { font-size:13.5px; color:var(--green); font-weight:700; margin-top:5px; }
  .modes { display:flex; gap:10px; margin-top:14px; }
  .mode-card { flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:14px; padding:13px 6px 11px; text-align:center; cursor:pointer; transition:all .15s; }
  .mode-card.on { border-color:var(--brand); background:var(--brand-soft); }
  .mode-card .ic { font-size:21px; }
  .mode-card .nm { font-size:12.5px; font-weight:700; margin-top:5px; }
  .mode-card .en { font-size:10px; color:var(--tx3); }
  .mode-card .pct { font-size:19px; font-weight:800; margin-top:4px; color:var(--tx); }
  .mode-card.on .pct { color:var(--brand); }
  .mode-card .ds { font-size:9.5px; color:var(--tx3); margin-top:2px; }
  .mode-hint { font-size:12px; margin-top:10px; line-height:1.6; border-radius:9px; padding:8px 12px; }
  .mode-hint.warn { color:#FF9500; background:var(--orange-soft); }
  .mode-hint.info { color:var(--tx2); background:var(--card2); }
  .duo { display:flex; gap:10px; margin-top:14px; }
  .duo .fn { flex:1; padding:13px 14px; cursor:pointer; }
  .duo .fn .t { font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .duo .fn .s { font-size:11.5px; color:var(--tx2); margin-top:6px; display:flex; align-items:center; justify-content:space-between; }
  .switch { width:40px; height:23px; border-radius:12px; background:var(--card2); border:1px solid var(--line); position:relative; transition:background .2s; flex:none; }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:17px; height:17px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.3); transition:left .2s; }
  .switch.on { background:var(--green); border-color:var(--green); }
  .switch.on::after { left:19px; }
  .lastchg { margin:auto 0 12px; background:var(--card2); border-radius:11px; padding:11px 14px; font-size:12px; color:var(--tx2); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .lastchg b.gain { color:var(--green); }
  .lastchg b.save { color:var(--brand); }

  /* ============ Tab3 Battery IQ ============ */
  .segment { display:flex; background:var(--card2); border-radius:11px; padding:3px; margin:10px 0; }
  .segment .sg { flex:1; text-align:center; font-size:13.5px; font-weight:700; padding:8px 0; border-radius:9px; color:var(--tx2); cursor:pointer; }
  .segment .sg.on { background:var(--brand); color:#fff; }
  .iq-stats { display:flex; align-items:stretch; gap:8px; }
  .iq-stats .st { flex:1; background:var(--card); border-radius:11px; padding:9px 6px; text-align:center; box-shadow:var(--shadow); }
  .iq-stats .st .k { font-size:10.5px; color:var(--tx3); }
  .iq-stats .st .v { font-size:13.5px; font-weight:800; margin-top:3px; }
  .iq-stats .st .v .id { color:var(--tx2); font-weight:600; font-size:11px; margin-right:3px; }
  .iq-stats .st.delta .v { color:var(--green); }
  .iq-stats .st.delta.warn .v { color:var(--red); }
  .cellgrid { display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:1fr; gap:7px; margin-top:10px; flex:1; }
  .cell { background:var(--card); border-radius:10px; padding:9px 6px 8px; text-align:center; cursor:pointer; border:1.5px solid transparent; box-shadow:var(--shadow); display:flex; flex-direction:column; justify-content:center; }
  .cell .no { font-size:10.5px; color:var(--tx3); font-weight:700; }
  .cell .mv { font-size:13.5px; font-weight:800; margin-top:2px; }
  .cell .bar { height:4px; border-radius:2px; background:var(--card2); margin-top:7px; overflow:hidden; }
  .cell .bar i { display:block; height:100%; border-radius:2px; background:var(--green); }
  .cell.hi { border-color:var(--brand); }
  .cell.hi .bar i { background:var(--brand); }
  .cell.lo { border-color:var(--blue); }
  .cell.lo .bar i { background:var(--blue); }
  .cell.warn { background:var(--yellow-soft); }
  .cell.warn .mv { color:var(--yellow); }
  .cell.warn .bar i { background:var(--yellow); }
  .cell.bad { background:var(--red-soft); border-color:var(--red); }
  .cell.bad .mv { color:var(--red); }
  .cell.bad .bar i { background:var(--red); width:18% !important; }
  .iq-foot { display:flex; gap:8px; margin:10px 0 12px; }
  .iq-foot .f { flex:1; background:var(--card); border-radius:11px; padding:11px 12px; display:flex; align-items:center; gap:9px; box-shadow:var(--shadow); }
  .iq-foot .f .k { font-size:10.5px; color:var(--tx3); }
  .iq-foot .f .v { font-size:14px; font-weight:800; }

  /* 故障检测 */
  .fault-ok { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  .fault-ok .shield { width:96px; height:96px; border-radius:50%; background:var(--green-soft); display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
  .fault-ok h2 { font-size:20px; font-weight:800; }
  .fault-ok .s1 { font-size:13.5px; color:var(--tx2); }
  .fault-ok .s2 { font-size:12.5px; color:var(--tx3); }
  .fault-sum { background:var(--red-soft); color:var(--red); border-radius:11px; padding:12px 14px; font-size:14px; font-weight:800; display:flex; align-items:center; gap:8px; margin-bottom:11px; }
  .fault-card { border-left:4px solid var(--red); padding:13px 15px; margin-bottom:10px; }
  .fault-card .t1 { font-size:15px; font-weight:800; color:var(--red); display:flex; align-items:center; gap:8px; }
  .fault-card .t2 { font-size:11.5px; color:var(--tx3); margin-top:3px; }
  .fault-card .t3 { font-size:12.5px; color:var(--tx2); margin-top:5px; }
  .fold-link { text-align:center; font-size:13px; color:var(--tx2); padding:13px 0; cursor:pointer; }
  .btn-report { margin-top:auto; margin-bottom:12px; }

  /* ============ Tab4 Support ============ */
  .diag-hero {
    margin-top:12px; border-radius:16px; padding:26px 20px; cursor:pointer; color:#fff;
    background:linear-gradient(135deg, #FF8A2A, #F25C05 70%); box-shadow:0 8px 24px rgba(242,92,5,.35);
  }
  .diag-hero .ic { font-size:30px; }
  .diag-hero h2 { font-size:18.5px; font-weight:800; margin-top:10px; }
  .diag-hero p { font-size:12.5px; opacity:.9; margin-top:5px; }
  .svc-list { margin-top:14px; padding:2px 16px; }
  .svc-row { display:flex; align-items:center; gap:13px; height:62px; cursor:pointer; }
  .svc-row + .svc-row { border-top:1px solid var(--line); }
  .svc-row .ic { font-size:20px; }
  .svc-row .t { font-size:14.5px; font-weight:600; }

function iqCells() {
  const v = cells();
  const max = Math.max(...v), min = Math.min(...v), delta = max - min;
  const iMax = v.indexOf(max), iMin = v.indexOf(min);
  const avg = v.reduce((a,b)=>a+b,0)/16;
  const fmt = mv => (mv/1000).toFixed(3) + 'V';
  const id = i => '#' + String(i+1).padStart(2,'0');
  const grid = v.map((mv,i) => {
    let cls = '';
    if (mv <= 2900) cls = 'bad';
    else if (mv < avg - 20) cls = 'warn';
    if (i === iMax) cls += ' hi';
    if (i === iMin && !cls.includes('bad')) cls += ' lo';
    const w = Math.max(15, Math.min(100, ((mv-3250)/60)*100));
    return `<div class="cell ${cls}" onclick="openCell(${i})">
      <div class="no">${id(i)}</div><div class="mv">${fmt(mv)}</div>
      <div class="bar"><i style="width:${w}%"></i></div>
    </div>`;
  }).join('');
  return `
    <div class="iq-stats">
      <div class="st"><div class="k">Highest Cell</div><div class="v"><span class="id">${id(iMax)}</span>${fmt(max)}</div></div>
      <div class="st delta ${delta>20?'warn':''}"><div class="k">Delta</div><div class="v">${delta}mV ${delta>20?'⚠️':'✅'}</div><div class="k">${delta>20?'Abnormal':'Normal'}</div></div>

    </div>`;
}

function cellChart(nowMv) {
  const pts = [];
  const seed = [0,-4,-8,-12,-16,-18,-15,-10,-6,-2,1,4,7,9,8,6,4,2,0,-2,-3,-2,-1,0];
  for (let i = 0; i < 24; i++) {
    const x = 10 + i * (300/23);
    const y = 70 - (seed[i] + 18) * (52/36);
    pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
  }
  return `<svg viewBox="0 0 320 92" width="100%">
    <line x1="10" y1="18" x2="310" y2="18" stroke="var(--line)" stroke-dasharray="3 3"/>
    <line x1="10" y1="44" x2="310" y2="44" stroke="var(--line)" stroke-dasharray="3 3"/>
    <line x1="10" y1="70" x2="310" y2="70" stroke="var(--line)" stroke-dasharray="3 3"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="var(--green)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="310" cy="${70-(0+18)*(52/36)}" r="3.5" fill="var(--green)"/>
    <text x="10" y="88" font-size="9" fill="var(--tx3)">-24h</text>
    <text x="155" y="88" font-size="9" fill="var(--tx3)">-12h</text>
    <text x="296" y="88" font-size="9" fill="var(--tx3)">Now</text>
  </svg>`;
}

/* ================= 渲染 ================= */
function render() {
  clearTimeout(timer);
  const scr = document.getElementById('screen');
  scr.dataset.theme = S.theme;
  let html = '';
  if (S.screen === 'main') {
    const body = { dash: tabDash, guard: tabGuard, iq: tabIQ, support: tabSupport }[S.tab]();
    html = statusbar() + appheader() + body + tabbar();
  } else {
    html = { bt01: pageBT01, bt02: pageBT02, bt03: pageBT03, bt04: pageBT04, bt05: pageBT05, bt06: pageBT06 }[S.screen]();
  }
  scr.innerHTML = html + overlayHTML();

  /* 自动跳转时序 */
  if (S.screen === 'bt02') timer = setTimeout(() => go('bt03'), 2500);
  if (S.screen === 'bt04') timer = setTimeout(() => go('bt05'), 2200);
  if (S.screen === 'bt05') timer = setTimeout(() => { S.screen = 'main'; S.tab = 'dash'; render(); }, 1600);
  if (S.overlay === 'ota' && S.otaState === 'progress') {
    requestAnimationFrame(() => { const f = document.getElementById('otaFill'); if (f) f.style.width = '100%'; });
    timer = setTimeout(() => { S.otaState = 'done'; render(); }, 2600);
  }
  renderNotes();
}
function renderNotes() {
  const p = document.getElementById('notesPanel');
  p.style.display = S.notes ? '' : 'none';
  if (!S.notes) return;
  const key = S.screen === 'main' ? S.tab : S.screen;
  let html = NOTES[key] || '';
  if (S.overlay && OV_NOTES[S.overlay]) {
    html += `<div style="margin-top:14px; border-top:1px dashed #dcdfe5; padding-top:10px;">${OV_NOTES[S.overlay]}</div>`;
  }
  html += `<div style="margin-top:16px; font-size:11px; color:#9ca0a8; border-top:1px solid #eceef1; padding-top:10px;">
    内容基准：UI 线框图规格说明 V2.0 · 界面英文为交付文案 · 数据为模拟值</div>`;
  p.innerHTML = html;
}

/* ================= 交互 ================= */
function go(s) { S.screen = s; S.overlay = null; render(); }
function goTab(t) { S.tab = t; S.overlay = null; render(); }
function goFaults() { S.tab = 'iq'; S.iqSeg = 'faults'; render(); }
function setSeg(s) { S.iqSeg = s; render(); }
function selMode(m) { S.mode = m; render(); }
function openOv(o) { S.overlay = o; if (o === 'ota') S.otaState = 'idle'; render(); }
function closeOv() { S.overlay = null; render(); }
function openCell(i) { S.cellIdx = i; S.overlay = 'cell'; render(); }
function confirmSched() {
  S.schedStart = document.getElementById('schedS').value;
  S.schedEnd = document.getElementById('schedE').value;
  S.schedOn = true; S.overlay = null; render();
  toast('🌙 Off-peak charging set: ' + S.schedStart + '–' + S.schedEnd);
}
function toggleSchedQuick() { S.schedOn ? (S.schedOn = false, render(), toast('Off-peak charging turned off')) : openOv('sched'); }
function confirmSupply() { S.supplyOn = !S.supplyOn; S.overlay = null; render(); toast(S.supplyOn ? '⚡ Supply Mode enabled' : 'Supply Mode disabled'); }
function startOTA() { S.otaState = 'progress'; render(); }
function toast(msg) {
  clearTimeout(toastTimer);
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('screen').appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2400);
}

/* ================= 工具栏 ================= */
function jumpTo(v) {
  if (!v) return;
  if (v.startsWith('tab:')) { S.screen = 'main'; S.tab = v.slice(4); S.overlay = null; }
  else { S.screen = v; S.overlay = null; }
  render();
  document.getElementById('jumpSel').value = '';
}
function toggleTheme() {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  document.getElementById('themeBtn').textContent = S.theme === 'dark' ? '🌙 深色主题' : '☀️ 浅色主题';
  render();
}
function toggleNotes() {
  S.notes = !S.notes;
  document.getElementById('notesBtn').classList.toggle('on', S.notes);
  render();
}
function toggleAlarm() {
  S.alarm = !S.alarm;
  const b = document.getElementById('alarmBtn');
  b.textContent = S.alarm ? '⚠️ 模拟告警：开' : '⚠️ 模拟告警：关';
  b.classList.toggle('on', S.alarm);
  render();
}
function restartFlow() { S.screen = 'bt01'; S.overlay = null; render(); }

/* ================= 手机框自适应缩放 ================= */
function fit() {
  const wrap = document.getElementById('phoneWrap');
  const stage = document.getElementById('stage');
  const availH = stage.clientHeight - 16;
  const availW = Math.min(stage.clientWidth - 16, window.innerWidth - 16);
  const scale = Math.min(1, availH / 868, availW / 414);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = (414 * scale) + 'px';
  wrap.style.height = (868 * scale) + 'px';
  document.getElementById('phone').style.transformOrigin = 'top left';
  wrap.style.transformOrigin = 'center';
  wrap.style.display = 'flex';
  wrap.style.alignItems = 'center';
  wrap.style.justifyContent = 'center';
}
window.addEventListener('resize', fit);
fit();
render();
</script>
