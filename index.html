<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEVOR Golf Cart Battery App · 交互原型 V2.2</title>
<style>
  /* ============ 外层页面（工具栏 + 画布） ============ */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background:#E9EBEF; color:#1c1e21; overflow:hidden;
  }
  #toolbar {
    height:56px; background:#fff; border-bottom:1px solid #dcdfe5;
    display:flex; align-items:center; gap:10px; padding:0 16px; flex-wrap:nowrap; overflow-x:auto;
  }
  #toolbar .brand { font-weight:700; font-size:14px; white-space:nowrap; }
  #toolbar .brand span { color:#FF7A00; }
  #toolbar .sep { width:1px; height:24px; background:#e1e4e9; flex:none; }
  .tbtn {
    border:1px solid #d4d8df; background:#fff; border-radius:8px; padding:6px 12px;
    font-size:12.5px; cursor:pointer; white-space:nowrap; color:#3a3d42; transition:all .15s;
  }
  .tbtn:hover { border-color:#FF7A00; color:#FF7A00; }
  .tbtn.on { background:#FF7A00; border-color:#FF7A00; color:#fff; }
  select.tbtn { appearance:auto; }
  #stage { height:calc(100% - 56px); display:flex; align-items:center; justify-content:center; gap:28px; padding:18px; }
  #phoneWrap { flex:none; }

  /* ============ 标注面板 ============ */
  #notesPanel {
    width:360px; max-height:92%; background:#fff; border:1px solid #dcdfe5; border-radius:14px;
    padding:18px 20px; overflow-y:auto; font-size:13px; line-height:1.75; color:#2c2f34;
    box-shadow:0 6px 24px rgba(0,0,0,.06);
  }
  #notesPanel h3 { font-size:14px; margin-bottom:10px; color:#111; display:flex; align-items:center; gap:6px; }
  #notesPanel h3::before { content:""; width:4px; height:14px; background:#FF7A00; border-radius:2px; }
  #notesPanel h4 { font-size:12.5px; margin:12px 0 4px; color:#FF7A00; }
  #notesPanel ul { padding-left:18px; }
  #notesPanel li { margin-bottom:3px; }
  #notesPanel table { width:100%; border-collapse:collapse; font-size:12px; margin:6px 0; }
  #notesPanel th, #notesPanel td { border:1px solid #e4e7ec; padding:4px 7px; text-align:left; }
  #notesPanel th { background:#f6f7f9; font-weight:600; }
  #notesPanel .tag { display:inline-block; background:#FFF1E6; color:#E06000; border-radius:4px; padding:0 6px; font-size:11px; margin-right:4px; }

  /* ============ 手机框 ============ */
  #phone {
    width:390px; height:844px; border-radius:54px; background:#000;
    border:12px solid #17181a; box-shadow:0 24px 60px rgba(0,0,0,.35), inset 0 0 0 2px #2a2b2e;
    position:relative; overflow:hidden;
  }
  #notch { position:absolute; top:12px; left:50%; transform:translateX(-50%); width:120px; height:32px; background:#17181a; border-radius:18px; z-index:99; }
  #screen { width:100%; height:100%; position:relative; overflow:hidden; display:flex; flex-direction:column; }

  /* ============ APP 主题变量 ============ */
  #screen[data-theme="dark"] {
    --bg:#0A0A0B; --bg2:#111113; --card:#19191C; --card2:#232327; --line:#2A2A2F;
    --tx:#FFFFFF; --tx2:#98989F; --tx3:#6A6A72;
    --brand:#FF7A00; --brand2:#FFB340; --brand-soft:rgba(255,122,0,.14);
    --green:#2FD158; --green-soft:rgba(47,209,88,.13);
    --red:#FF453A; --red-soft:rgba(255,69,58,.13);
    --yellow:#FFD60A; --yellow-soft:rgba(255,214,10,.10);
    --orange-soft:rgba(255,149,0,.13); --blue:#3B9CFF; --purple:#A97CFF;
    --bn-ok-bg:#15391F; --bn-ok-tx:#FFFFFF; --bn-bad-bg:#3D1410; --bn-bad-tx:#FFFFFF;
    --mask:rgba(0,0,0,.6); --shadow:0 2px 10px rgba(0,0,0,.35); --knob:#FFFFFF;
  }
  #screen[data-theme="light"] {
    --bg:#F2F3F6; --bg2:#FFFFFF; --card:#FFFFFF; --card2:#F2F3F6; --line:#E6E8EC;
    --tx:#17181A; --tx2:#6B6E76; --tx3:#9CA0A8;
    --brand:#F26A00; --brand2:#FF9A3D; --brand-soft:rgba(242,106,0,.10);
    --green:#1FA84A; --green-soft:rgba(31,168,74,.10);
    --red:#E5372C; --red-soft:rgba(229,55,44,.08);
    --yellow:#D9A400; --yellow-soft:rgba(217,164,0,.10);
    --orange-soft:rgba(242,106,0,.10); --blue:#1677D9; --purple:#7C4DD9;
    --bn-ok-bg:#DFF5E5; --bn-ok-tx:#136B33; --bn-bad-bg:#FCE2DE; --bn-bad-tx:#9E261C;
    --mask:rgba(0,0,0,.4); --shadow:0 4px 14px rgba(0,0,0,.07); --knob:#FFFFFF;
  }
  #screen { background:var(--bg); color:var(--tx); }

  /* ============ APP 通用 ============ */
  .ic { display:inline-flex; flex:none; }
  .ic svg { width:100%; height:100%; }
  .statusbar { height:54px; flex:none; display:flex; align-items:flex-end; justify-content:space-between; padding:0 28px 4px; font-size:14px; font-weight:600; color:var(--tx); }
  .sb-icons { display:flex; gap:5px; align-items:center; }
  .appheader { height:48px; flex:none; display:flex; align-items:center; padding:0 18px; gap:9px; }
  .appheader .dev { font-size:16px; font-weight:800; letter-spacing:.2px; }
  .appheader .conn { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--green); }
  .appheader .conn::before { content:""; width:7px; height:7px; border-radius:50%; background:var(--green); }
  .appheader .bell { margin-left:auto; position:relative; width:23px; height:23px; cursor:pointer; color:var(--tx); }
  .appheader .bell::after { content:""; position:absolute; top:0; right:0; width:7px; height:7px; background:var(--red); border-radius:50%; border:1.5px solid var(--bg); }
  .content { flex:1; display:flex; flex-direction:column; overflow:hidden; padding:0 16px; }
  .tabbar { flex:none; height:84px; border-top:1px solid var(--line); background:var(--bg2); display:flex; padding-bottom:18px; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; font-size:10px; color:var(--tx3); cursor:pointer; }
  .tab.on { color:var(--brand); }
  .tab .ic { width:23px; height:23px; }
  .card { background:var(--card); border-radius:14px; box-shadow:var(--shadow); }
  .btn-primary {
    background:var(--brand); color:#fff; border:none; border-radius:13px; height:52px; width:100%;
    font-size:16px; font-weight:700; cursor:pointer; letter-spacing:.2px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-primary:active { opacity:.85; }
  .btn-primary .ic { width:18px; height:18px; }
  .link { color:var(--tx2); font-size:13px; text-align:center; cursor:pointer; }
  .link b { color:var(--brand); }
  .sec-title { font-size:15px; font-weight:800; margin:14px 2px 9px; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; flex:none; }

  /* ============ 蓝牙流程 ============ */
  .bt-page { flex:1; display:flex; flex-direction:column; padding:0 24px; }
  .bt-logo { text-align:center; margin-top:9%; }
  .bt-logo .mark { width:64px; height:64px; border-radius:18px; background:var(--brand-soft); color:var(--brand); display:inline-flex; align-items:center; justify-content:center; padding:14px; }
  .bt-logo h1 { font-size:23px; font-weight:800; letter-spacing:1px; margin-top:12px; }
  .bt-logo h1 span { color:var(--brand); }
  .perm-card { margin-top:10%; padding:8px 18px; }
  .perm-row { display:flex; align-items:center; gap:14px; height:64px; }
  .perm-row + .perm-row { border-top:1px solid var(--line); }
  .perm-row .pic { width:36px; height:36px; border-radius:10px; background:var(--brand-soft); color:var(--brand); display:flex; align-items:center; justify-content:center; padding:8px; flex:none; }
  .perm-row .t1 { font-size:15.5px; font-weight:700; }
  .perm-row .t2 { font-size:12.5px; color:var(--tx2); margin-top:2px; }
  .bt-foot { margin-top:auto; padding-bottom:36px; }
  .bt-foot .legal { font-size:11px; color:var(--tx3); text-align:center; margin-top:14px; }

  .pulse-zone { height:36%; flex:none; display:flex; align-items:center; justify-content:center; position:relative; }
  .pulse-core { width:78px; height:78px; border-radius:50%; background:var(--brand-soft); color:var(--brand); display:flex; align-items:center; justify-content:center; padding:20px; z-index:2; }
  .pulse-ring { position:absolute; width:78px; height:78px; border-radius:50%; border:2px solid var(--brand); opacity:0; animation:pulse 2s ease-out infinite; }
  .pulse-ring:nth-child(2) { animation-delay:.66s; }
  .pulse-ring:nth-child(3) { animation-delay:1.32s; }
  @keyframes pulse { 0%{transform:scale(1);opacity:.7;} 100%{transform:scale(3.1);opacity:0;} }
  .scan-txt { text-align:center; font-size:14px; color:var(--tx2); }
  .tips-box { margin:18px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:14px 4px; font-size:13px; color:var(--tx2); line-height:2; }
  .tips-box .tt { display:flex; align-items:center; gap:7px; color:var(--tx); font-weight:600; }
  .tips-box .tt .ic { width:16px; height:16px; color:var(--yellow); }
  .found-label { display:flex; align-items:center; gap:10px; color:var(--tx3); font-size:12px; margin:6px 0 10px; }
  .found-label::before, .found-label::after { content:""; flex:1; height:1px; background:var(--line); }

  .dev-card { display:flex; align-items:center; gap:13px; padding:14px 16px; margin-bottom:12px; }
  .dev-card .pic { width:40px; height:40px; border-radius:11px; background:var(--brand-soft); color:var(--brand); display:flex; align-items:center; justify-content:center; padding:9px; flex:none; }
  .dev-card .nm { font-size:15.5px; font-weight:700; }
  .dev-card .sig { font-size:12px; color:var(--tx2); margin-top:3px; display:flex; align-items:center; gap:6px; }
  .sigbars { display:inline-flex; gap:2px; align-items:flex-end; height:12px; }
  .sigbars i { width:3.5px; background:var(--green); border-radius:1px; }
  .sigbars i.off { background:var(--line); }
  .btn-sm { margin-left:auto; background:var(--brand); color:#fff; border:none; border-radius:9px; padding:9px 18px; font-size:13.5px; font-weight:700; cursor:pointer; }

  .connect-zone { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; }
  .conn-anim { display:flex; align-items:center; gap:12px; color:var(--tx); }
  .conn-anim .ic { width:36px; height:36px; color:var(--brand); }
  .conn-line { width:120px; height:3px; border-radius:2px; background:repeating-linear-gradient(90deg, var(--brand) 0 10px, transparent 10px 18px); background-size:36px 3px; animation:flow 1s linear infinite; }
  @keyframes flow { to { background-position:36px 0; } }
  .conn-txt { font-size:14px; color:var(--tx2); text-align:center; line-height:1.8; }

  .ok-zone { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
  .ok-badge { width:84px; height:84px; border-radius:50%; background:var(--green-soft); color:var(--green); display:flex; align-items:center; justify-content:center; padding:20px; animation:pop .45s cubic-bezier(.2,1.6,.4,1); margin-bottom:8px; }
  @keyframes pop { 0%{transform:scale(.3);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  .ok-zone h2 { font-size:21px; font-weight:800; }
  .ok-zone .sub { font-size:14px; color:var(--brand); font-weight:700; }
  .ok-zone .sn { font-size:12px; color:var(--tx3); }

  .nf-head { text-align:center; margin-top:6%; }
  .nf-head .nic { width:54px; height:54px; color:var(--tx3); display:inline-flex; padding:4px; }
  .nf-head h2 { font-size:19px; color:var(--tx2); font-weight:700; margin-top:10px; }
  .steps-card { margin-top:20px; padding:6px 18px; }
  .step-row { display:flex; gap:12px; padding:13px 0; }
  .step-row + .step-row { border-top:1px solid var(--line); }
  .step-row .no { width:22px; height:22px; border-radius:50%; background:var(--brand-soft); color:var(--brand); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:none; margin-top:1px; }
  .step-row .t1 { font-size:14px; font-weight:700; }
  .step-row .t2 { font-size:12px; color:var(--tx2); margin-top:2px; }

  /* ============ Tab1 Dashboard ============ */
  .soc-zone { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6px 0; }
  .ring-box { position:relative; width:248px; height:248px; }
  .ring-box > svg { transform:rotate(120deg); }
  .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-center .lbl { font-size:13px; color:var(--tx2); letter-spacing:3px; font-weight:700; }
  .ring-center .val { font-size:58px; font-weight:800; line-height:1.08; letter-spacing:-2px; }
  .ring-center .val small { font-size:28px; font-weight:700; letter-spacing:0; }
  .ring-center .amp { font-size:16px; color:var(--green); font-weight:700; margin-top:2px; display:flex; align-items:center; gap:3px; }
  .ring-center .chg { font-size:13.5px; color:var(--tx2); margin-top:2px; }
  .health-line { display:flex; align-items:center; gap:8px; font-size:15px; color:var(--tx2); margin-top:12px; }
  .health-line .ic { width:19px; height:19px; color:var(--green); }
  .health-line b { color:var(--tx); font-size:16px; }
  .quad { display:flex; gap:8px; margin-top:6px; }
  .quad .q { flex:1; background:var(--card); border-radius:14px; padding:15px 4px 13px; text-align:center; box-shadow:var(--shadow); }
  .quad .q .v { font-size:19px; font-weight:800; letter-spacing:-.3px; }
  .quad .q .v small { font-size:11px; font-weight:700; color:var(--tx2); margin-left:1px; }
  .quad .q .k { font-size:10.5px; color:var(--tx3); margin-top:4px; }
  .alert-banner { margin:14px 0 16px; border-radius:15px; padding:17px 16px; display:flex; align-items:center; gap:10px; font-size:15px; font-weight:700; cursor:pointer; }
  .alert-banner .ic { width:21px; height:21px; }
  .alert-banner.ok { background:var(--bn-ok-bg); color:var(--bn-ok-tx); }
  .alert-banner.ok .ic { color:var(--green); }
  .alert-banner.bad { background:var(--bn-bad-bg); color:var(--bn-bad-tx); }
  .alert-banner.bad .ic { color:var(--red); }
  .alert-banner .arr { margin-left:auto; font-weight:400; opacity:.7; }

  /* ============ Tab2 Lifetime Guard ============ */
  .lg-title { display:flex; align-items:center; gap:7px; padding:12px 2px 12px; }
  .lg-title .ic { width:19px; height:19px; color:var(--brand); }
  .lg-title h2 { font-size:18px; font-weight:800; background:linear-gradient(90deg, var(--brand2), var(--brand)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .lg-title .act { margin-left:auto; display:flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; color:var(--green); background:var(--green-soft); border-radius:11px; padding:3px 10px; }
  .lg-title .act::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--green); }
  .guard-card { padding:18px 16px 14px; }
  .gbar-labels { display:flex; justify-content:space-between; align-items:center; font-size:12.5px; color:var(--tx2); margin-bottom:14px; }
  .gbar-labels b { color:var(--tx); font-size:13.5px; }
  .gbar-labels .lim { display:flex; align-items:center; gap:5px; color:var(--green); font-weight:800; font-size:13.5px; }
  .gbar-labels .lim .ic { width:16px; height:16px; }
  .gbar { position:relative; height:10px; border-radius:5px; background:var(--card2); margin:4px 2px 0; }
  .gbar .restzone { position:absolute; right:0; top:3.5px; height:3px; background-image:radial-gradient(circle, var(--tx3) 1.2px, transparent 1.3px); background-size:8px 3px; background-repeat:repeat-x; }
  .gbar .fill { position:absolute; left:0; top:0; bottom:0; border-radius:5px; background:linear-gradient(90deg, #1FA84A, var(--green)); transition:width .4s; }
  .gbar .knob { position:absolute; top:50%; transform:translate(-50%,-50%); width:21px; height:21px; border-radius:50%; background:var(--knob); box-shadow:0 1px 6px rgba(0,0,0,.45); transition:left .4s; }
  .gbar .limmark { position:absolute; top:-24px; transform:translateX(-50%); width:17px; height:17px; color:var(--green); transition:left .4s; }
  .gbar-scale { display:flex; justify-content:space-between; font-size:11px; color:var(--tx3); margin:9px 2px 0; }
  .guard-sub { font-size:12.5px; color:var(--tx2); margin-top:13px; text-align:center; }
  .guard-gain { font-size:14px; color:var(--green); font-weight:700; margin-top:7px; text-align:center; display:flex; align-items:center; justify-content:center; gap:6px; }
  .guard-gain .ic { width:16px; height:16px; }
  .modes { display:flex; gap:10px; }
  .mode-card { flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:15px; padding:14px 6px 12px; text-align:center; cursor:pointer; transition:all .15s; }
  .mode-card.on { border-color:var(--green); background:var(--green-soft); }
  .mode-card .mic { width:24px; height:24px; display:inline-flex; }
  .mode-card .mic.g { color:var(--green); } .mode-card .mic.b { color:var(--blue); } .mode-card .mic.p { color:var(--purple); }
  .mode-card .nm { font-size:13px; font-weight:800; margin-top:6px; }
  .mode-card .pct { font-size:22px; font-weight:800; margin-top:3px; letter-spacing:-.5px; }
  .mode-card .ds { font-size:9.5px; color:var(--tx3); margin-top:3px; }
  .mode-hint { font-size:12px; margin-top:10px; line-height:1.6; border-radius:10px; padding:8px 12px; }
  .mode-hint.warn { color:#FF9500; background:var(--orange-soft); }
  .mode-hint.info { color:var(--tx2); background:var(--card2); }
  .duo { display:flex; gap:10px; margin-top:14px; }
  .duo .fn { flex:1; padding:13px 14px; cursor:pointer; }
  .duo .fn .t { font-size:13.5px; font-weight:700; display:flex; align-items:flex-start; gap:7px; line-height:1.35; }
  .duo .fn .t .ic { width:17px; height:17px; margin-top:1px; }
  .duo .fn .s { font-size:11.5px; color:var(--tx2); margin-top:9px; display:flex; align-items:center; justify-content:space-between; }
  .switch { width:42px; height:24px; border-radius:13px; background:var(--card2); border:1px solid var(--line); position:relative; transition:background .2s; flex:none; }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.3); transition:left .2s; }
  .switch.on { background:var(--brand); border-color:var(--brand); }
  .switch.on::after { left:20px; }
  .lastchg { margin:auto 0 12px; background:var(--card); border-radius:13px; padding:12px 14px; font-size:12.5px; color:var(--tx2); display:flex; align-items:center; gap:6px; flex-wrap:wrap; box-shadow:var(--shadow); }
  .lastchg .ic { width:15px; height:15px; color:var(--tx2); margin-right:2px; }
  .lastchg b.gain { color:var(--green); }
  .lastchg b.save { color:var(--green); }
  .lastchg .w { color:var(--tx); font-weight:600; }

  /* ============ Tab3 Battery IQ ============ */
  .segment { display:flex; background:var(--card); border-radius:22px; padding:4px; margin:10px 0; box-shadow:var(--shadow); }
  .segment .sg { flex:1; text-align:center; font-size:13.5px; font-weight:700; padding:9px 0; border-radius:18px; color:var(--tx2); cursor:pointer; }
  .segment .sg.on { background:var(--brand); color:#fff; }
  .iq-stats { display:flex; align-items:stretch; background:var(--card); border-radius:13px; box-shadow:var(--shadow); }
  .iq-stats .st { flex:1; padding:11px 4px 10px; text-align:center; }
  .iq-stats .st + .st { border-left:1px solid var(--line); }
  .iq-stats .st .k { font-size:10.5px; color:var(--tx3); }
  .iq-stats .st .v { font-size:14px; font-weight:800; margin-top:4px; }
  .iq-stats .st .v .id { color:var(--tx2); font-weight:600; font-size:11px; margin-right:3px; }
  .iq-stats .st.hi .v em { font-style:normal; color:var(--brand); }
  .iq-stats .st.lo .v em { font-style:normal; color:var(--blue); }
  .iq-stats .st.delta .v { color:var(--green); display:flex; align-items:center; justify-content:center; gap:4px; }
  .iq-stats .st.delta .v .ic { width:14px; height:14px; }
  .iq-stats .st.delta.warn .v { color:var(--red); }
  .iq-stats .st .k2 { font-size:10px; color:var(--tx3); margin-top:2px; }
  .cellgrid { display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:1fr; gap:7px; margin-top:10px; flex:1; }
  .cell { background:var(--card); border-radius:12px; padding:9px 6px 9px; text-align:center; cursor:pointer; border:1.5px solid transparent; box-shadow:var(--shadow); display:flex; flex-direction:column; justify-content:center; }

function iqCells() {
  const v = cells();
  const max = Math.max(...v), min = Math.min(...v), delta = max - min;
  const iMax = v.indexOf(max), iMin = v.indexOf(min);
  const avg = v.reduce((a,b)=>a+b,0)/16;
  const fmt = mv => (mv/1000).toFixed(3) + 'V';
  const id = i => '#' + String(i+1).padStart(2,'0');
  const grid = v.map((mv,i) => {
    let cls = '';
    if (mv <= 2900) cls = 'bad';
    else if (mv < avg - 20) cls = 'warn';
    if (i === iMax) cls += ' hi';
    if (i === iMin && !cls.includes('bad')) cls += ' lo';
    const w = Math.max(15, Math.min(100, ((mv-3250)/60)*100));
    return `<div class="cell ${cls}" onclick="openCell(${i})">
      <div class="no">${id(i)}</div><div class="mv">${fmt(mv)}</div>
      <div class="bar"><i style="width:${w}%"></i></div>
    </div>`;
  }).join('');
  return `
    <div class="iq-stats">
      <div class="st hi"><div class="k">${t('highestCell')}</div><div class="v"><span class="id">${id(iMax)}</span><em>${fmt(max)}</em></div></div>
      <div class="st delta ${delta>20?'warn':''}"><div class="k">${t('delta')}</div><div class="v">${delta}mV ${delta>20?ic('warn',14):ic('checkC',14)}</div><div class="k2">${delta>20?t('abnormal'):t('normal')}</div></div>
      <div class="st lo"><div class="k">${t('lowestCell')}</div><div class="v"><span class="id">${id(iMin)}</span><em>${fmt(min)}</em></div></div>
    </div>
    <div class="cellgrid">${grid}</div>
    <div class="iq-foot">
      <div class="f"><span class="fic ic" style="color:var(--green)">${I.shieldCheck}</span><div><div class="k">${t('batteryHealth')}</div><div class="v">94 / 100</div></div></div>

    </div>`;
}

function cellChart(nowMv) {
  const pts = [];
  const seed = [0,-4,-8,-12,-16,-18,-15,-10,-6,-2,1,4,7,9,8,6,4,2,0,-2,-3,-2,-1,0];
  for (let i = 0; i < 24; i++) {
    const x = 10 + i * (300/23);
    const y = 70 - (seed[i] + 18) * (52/36);
    pts.push(`${x.toFixed(1)},${y.toFixed(1)}`);
  }
  return `<svg viewBox="0 0 320 92" width="100%">
    <line x1="10" y1="18" x2="310" y2="18" stroke="var(--line)" stroke-dasharray="3 3"/>
    <line x1="10" y1="44" x2="310" y2="44" stroke="var(--line)" stroke-dasharray="3 3"/>
    <line x1="10" y1="70" x2="310" y2="70" stroke="var(--line)" stroke-dasharray="3 3"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="var(--green)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="310" cy="${70-(0+18)*(52/36)}" r="3.5" fill="var(--green)"/>
    <text x="10" y="88" font-size="9" fill="var(--tx3)">-24h</text>
    <text x="155" y="88" font-size="9" fill="var(--tx3)">-12h</text>
    <text x="290" y="88" font-size="9" fill="var(--tx3)">${t('nowLbl')}</text>
  </svg>`;
}

  sched: `<h4>预约错峰充电（底部抽屉）</h4><ul><li>从底部滑出 300ms ease-out，最大高度 60%</li><li>开始/结束时间选择器 + 确认按钮</li><li>关闭：下滑手势 / 点遮罩 / ✕</li></ul>`,
  supply: `<h4>极客强充（居中 Modal）</h4><ul><li>宽 85%、圆角 16dp，遮罩 rgba(0,0,0,.5)</li><li>警告图标 + 风险说明 + 取消/确认</li><li><b>仅按钮可关闭</b>（防误操作）</li></ul>`,
  cell: `<h4>电芯历史曲线（底部抽屉）</h4><ul><li>电芯编号 + 24h 历史电压折线图</li><li>采样间隔 30min（演示数据）</li></ul>`,
  checks: `<h4>全部检测项目（底部抽屉）</h4><ul><li>22 项完整列表，<b>异常项置顶</b>并红色标识</li><li>仅抽屉内部可滚动</li></ul>`,
  ota: `<h4>OTA 升级（居中 Modal）</h4><ul><li>版本对比 + 更新日志 + 立即更新</li><li>升级中显示进度条，完成后显示新版本号</li></ul>`,
  report: `<h4>诊断报告预览（全屏抽屉，高度 88%）</h4>
    <ul><li><b>流程：</b>点"生成报告" → 先预览内容 → 用户确认后才发送（替代直接发送的黑盒操作）</li>
    <li><b>顶部状态横幅：</b>正常 = 绿色，大字 All Systems Normal + 小字 22 diagnostic checks passed；告警 = 红色，大字 X Issues Detected，故障项红卡片<b>置顶显眼展示</b></li>
    <li><b>Battery Snapshot：</b>SOC / 总电压 / 电流 / 压差（&gt;20mV 标红）/ 最高最低电芯 / SOH / 循环次数 / 温度</li>
    <li><b>Device：</b>设备名 / SN / 固件 / APP 版本</li>
    <li>底部注明 Report ID + 生成时间 + 隐私提示（发送内容包含截图）</li>
    <li>双按钮：Cancel（灰）/ Send to Support（品牌色，占比更宽）</li>
    <li><span class="tag">演示</span>切换顶部"模拟告警"后再打开报告，可看红色版本</li></ul>`,
};

/* ================= 渲染 ================= */
function render() {
  clearTimeout(timer);
  const scr = document.getElementById('screen');
  scr.dataset.theme = S.theme;
  let html = '';
  if (S.screen === 'main') {
    const body = { dash: tabDash, guard: tabGuard, iq: tabIQ, support: tabSupport }[S.tab]();
    html = statusbar() + appheader() + body + tabbar();
  } else {
    html = { bt01: pageBT01, bt02: pageBT02, bt03: pageBT03, bt04: pageBT04, bt05: pageBT05, bt06: pageBT06 }[S.screen]();
  }
  scr.innerHTML = html + overlayHTML();

  if (S.screen === 'bt02') timer = setTimeout(() => go('bt03'), 2500);
  if (S.screen === 'bt04') timer = setTimeout(() => go('bt05'), 2200);
  if (S.screen === 'bt05') timer = setTimeout(() => { S.screen = 'main'; S.tab = 'dash'; render(); }, 1600);
  if (S.overlay === 'ota' && S.otaState === 'progress') {
    requestAnimationFrame(() => { const f = document.getElementById('otaFill'); if (f) f.style.width = '100%'; });
    timer = setTimeout(() => { S.otaState = 'done'; render(); }, 2600);
  }
  renderNotes();
}
function renderNotes() {
  const p = document.getElementById('notesPanel');
  p.style.display = S.notes ? '' : 'none';
  if (!S.notes) return;
  const key = S.screen === 'main' ? S.tab : S.screen;
  let html = NOTES[key] || '';
  if (S.overlay && OV_NOTES[S.overlay]) {
    html += `<div style="margin-top:14px; border-top:1px dashed #dcdfe5; padding-top:10px;">${OV_NOTES[S.overlay]}</div>`;
  }
  html += `<div style="margin-top:16px; font-size:11px; color:#9ca0a8; border-top:1px solid #eceef1; padding-top:10px;">
    内容基准：UI 线框图规格说明 V2.0 · 视觉基准：高保真参考图 · 英文版为最终交付文案，中文版供团队评审 · 数据为模拟值</div>`;
  p.innerHTML = html;
}

/* ================= 交互 ================= */
function go(s) { S.screen = s; S.overlay = null; render(); }
function goTab(tb) { S.tab = tb; S.overlay = null; render(); }
function goFaults() { S.tab = 'iq'; S.iqSeg = 'faults'; render(); }
function setSeg(s) { S.iqSeg = s; render(); }
function selMode(m) { S.mode = m; render(); }
function openOv(o) { S.overlay = o; if (o === 'ota') S.otaState = 'idle'; render(); }
function closeOv() { S.overlay = null; render(); }
function openCell(i) { S.cellIdx = i; S.overlay = 'cell'; render(); }
function confirmSched() {
  S.schedStart = document.getElementById('schedS').value;
  S.schedEnd = document.getElementById('schedE').value;
  S.schedOn = true; S.overlay = null; render();
  toast(tf('tSchedSet', S.schedStart + '–' + S.schedEnd));
}
function toggleSchedQuick() { S.schedOn ? (S.schedOn = false, render(), toast(t('tSchedOff'))) : openOv('sched'); }
function confirmSupply() { S.supplyOn = !S.supplyOn; S.overlay = null; render(); toast(S.supplyOn ? t('tSupplyOn') : t('tSupplyOff')); }
function startOTA() { S.otaState = 'progress'; render(); }
function sendReport() { S.overlay = null; render(); toast(t('tSent')); }
function toast(msg) {
  clearTimeout(toastTimer);
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('screen').appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2400);
}

/* ================= 工具栏 ================= */
function jumpTo(v) {
  if (!v) return;
  if (v.startsWith('tab:')) { S.screen = 'main'; S.tab = v.slice(4); S.overlay = null; }
  else { S.screen = v; S.overlay = null; }
  render();
  document.getElementById('jumpSel').value = '';
}
function toggleLang() {
  S.lang = S.lang === 'zh' ? 'en' : 'zh';
  document.getElementById('langBtn').textContent = S.lang === 'zh' ? '🌐 界面语言：中文' : '🌐 UI Language: English';
  render();
}
function setTheme(v) { S.theme = v; render(); }
function toggleNotes() {
  S.notes = !S.notes;
  document.getElementById('notesBtn').classList.toggle('on', S.notes);
  render();
}
function toggleAlarm() {
  S.alarm = !S.alarm;
  const b = document.getElementById('alarmBtn');
  b.textContent = S.alarm ? '⚠️ 模拟告警：开' : '⚠️ 模拟告警：关';
  b.classList.toggle('on', S.alarm);
  render();
}
function restartFlow() { S.screen = 'bt01'; S.overlay = null; render(); }

/* ================= 手机框自适应缩放 ================= */
function fit() {
  const wrap = document.getElementById('phoneWrap');
  const stage = document.getElementById('stage');
  const availH = stage.clientHeight - 16;
  const availW = Math.min(stage.clientWidth - 16, window.innerWidth - 16);
  const scale = Math.min(1, availH / 868, availW / 414);
  wrap.style.transform = `scale(${scale})`;
  wrap.style.width = (414 * scale) + 'px';
  wrap.style.height = (868 * scale) + 'px';
  document.getElementById('phone').style.transformOrigin = 'top left';
  wrap.style.transformOrigin = 'center';
  wrap.style.display = 'flex';
  wrap.style.alignItems = 'center';
  wrap.style.justifyContent = 'center';
}
window.addEventListener('resize', fit);
fit();
render();
</script>
